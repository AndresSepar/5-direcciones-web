<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Título Principal -->
        <title>5 Direcciones | Estrategia Empresarial</title>

        <!-- Favicon (Asegúrate que la imagen esté en la carpeta public) -->
        <link
            rel="icon"
            type="image/png"
            href="favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="shortcut icon" href="favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="5 Direcciones" />
        <link rel="manifest" href="site.webmanifest" />

        <!-- Metadatos de SEO -->
        <meta
            name="description"
            content="Consultoría empresarial integral en dirección administrativa, financiera, jurídica, talento humano y marketing digital. Impulsa tu empresa con 5 Direcciones."
        />
        <meta
            name="keywords"
            content="Consultoría Empresarial, 5 Direcciones, Estrategia, Finanzas, Marketing Digital, Colombia, Asesoría Legal"
        />

        <!-- Open Graph (Cómo se ve al compartir en WhatsApp/Facebook) -->
        <meta
            property="og:title"
            content="5 Direcciones | Estrategia Empresarial"
        />
        <meta
            property="og:description"
            content="Acompañamos a emprendedores y empresarios en la consecución de sus objetivos con soluciones integrales."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.5direcciones.com.co/" />
        <!-- Puedes poner tu logo aquí también para que salga al compartir -->
        <meta property="og:image" content="/logo-5-direcciones.png" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="5 Direcciones | Estrategia Empresarial"
        />
        <meta
            name="twitter:description"
            content="Soluciones integrales para el crecimiento de tu empresa."
        />
        <meta name="twitter:image" content="/logo-5-direcciones.png" />
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
